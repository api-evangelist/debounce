apis:
  - aid: debounce:email-validation-api
    name: DeBounce Email Validation API
    description: >
      The DeBounce Email Validation API provides real-time and bulk email address
      verification, checking deliverability, detecting disposable and role-based
      addresses, validating syntax and MX records, and performing SMTP mailbox
      verification. The API also includes a Data Append endpoint for reverse email
      lookup and a Disposable Detector endpoint for checking against known temporary
      email domain lists.
