aid: debounce
name: DeBounce
description: >
  DeBounce is an email validation and verification REST API that helps developers
  ensure the deliverability and quality of email addresses at scale. The API supports
  real-time single email validation, asynchronous bulk list processing, and data
  enrichment via reverse email lookup. It detects disposable addresses, role-based
  emails, catch-all domains, syntax errors, and performs MX record and SMTP-level
  mailbox verification. DeBounce offers pay-as-you-go credit-based pricing with no
  monthly subscription required, full API access at every tier, and credits that
  never expire.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
