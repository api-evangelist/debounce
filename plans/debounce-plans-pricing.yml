name: DeBounce Plans and Pricing
description: >
  DeBounce uses a pay-as-you-go credit-based pricing model with no monthly
  subscription required. Credits are purchased in volume packages and never
  expire. All features are available at every credit tier. Volume discounts
  apply as the quantity of credits purchased increases.
specificationVersion: '0.1'
url: https://debounce.com/pricing/

pricing:
  model: pay-as-you-go
  currency: USD
  billingCycle: one-time
  creditsExpire: false
  contractRequired: false
  setupFee: false

plans:
  - name: Free Starter
    description: >
      New users receive 100 free credits on signup with no credit card required.
      Suitable for testing the API and evaluating validation quality.
    cost: 0.00
    credits: 100
    pricePerCredit: 0.00
    features:
      - Single email validation
      - Bulk validation access
      - API access included
      - Full feature access

  - name: 5K Credits
    description: Entry-level paid package for small-volume validation needs.
    cost: 10.00
    credits: 5000
    pricePerCredit: 0.002
    features:
